<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>

    <meta name="description" content="모든 위대한 여정은 하나의 생각에서 시작됩니다. 내 첫번째 아이디어를 만나보세요.">
    <meta property="og:title" content="내 첫번째 아이디어">

    <canvas id="particle-canvas"></canvas>

    <div class="glow-blob blob-1"></div>

            <div class="badge">Project Start</div>

            <div class="divider"></div>
            <button class="action-btn" id="explore-btn">
                <span>다음 문장 보기</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>

        </div>
    </main>

    <!-- Script -->
    <script src="script.js"></script>
